<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Wannar OS | لوحة الإنجاز</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">WANNAR <span>PRO</span></div>
            
            <div class="stats-box">
                <p>مستوى العمران الدراسي</p>
                <div class="progress-track"><div id="bar" class="fill"></div></div>
                <span id="percent">0%</span>
            </div>

            <div class="timer-section">
                <div id="clock" class="timer">25:00</div>
                <button id="startTimer" class="btn-primary">بدأ التركيز</button>
            </div>

            <div class="input-area">
                <input type="text" id="subject" placeholder="اسم المادة/الفصل">
                <button id="buildBtn" class="btn-build">إضافة إنجاز 🏗️</button>
            </div>

            <button onclick="resetAll()" class="btn-reset">تصفير النظام</button>
        </aside>

        <main class="viewport">
            <div class="iso-plane" id="plane">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
