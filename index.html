<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Wannar - عالم الإنجاز الدراسي</title>
    <style>
        :root {
            --bg-deep: #0a0e17;
            --panel-bg: #161b26;
            --accent: #00d2ff;
            --math-color: #ff4b2b; /* فيزياء/رياضيات */
            --bio-color: #45a247;  /* أحياء */
            --lit-color: #fbd033;  /* لغات/أدبي */
        }

        body {
            margin: 0; font-family: 'Tajawal', sans-serif;
            background: var(--bg-deep); color: white;
            display: grid; grid-template-columns: 380px 1fr; height: 100vh;
        }

        /* لوحة التحكم الجانبية */
        .sidebar {
            background: var(--panel-bg); padding: 25px;
            border-left: 2px solid #1f2937; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        .user-profile {
            background: rgba(255,255,255,0.05); padding: 15px;
            border-radius: 12px; text-align: center;
        }

        .timer-box {
            background: #000; padding: 20px; border-radius: 15px;
            text-align: center; border: 1px solid var(--accent);
        }
        #timer-display { font-size: 2.5rem; font-weight: bold; color: var(--accent); }

        .input-card {
            background: #1f2937; padding: 15px; border-radius: 10px;
            display: flex; flex-direction: column; gap: 10px;
        }

        input, select, button {
            padding: 12px; border-radius: 8px; border: none; font-family: inherit;
        }
        
        button { cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-start { background: var(--accent); color: #000; }
        .btn-build { background: #fff; color: #000; margin-top: 10px; }

        /* منطقة المدينة */
        .city-view {
            position: relative; overflow: hidden;
            background: radial-gradient(circle at center, #1e293b 0%, #0a0e17 100%);
        }

        .grid-plane {
            position: absolute; width: 800px; height: 800px;
            top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* تصميم المبنى الاحترافي */
        .house {
            position: absolute; width: 40px; height: 40px;
            transform-style: preserve-3d; transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .wall {
            position: absolute; width: 100%; height: var(--h);
            background: var(--c); border: 1px solid rgba(0,0,0,0.2);
        }
        .f { transform: rotateY(0deg) translateZ(20px); filter: brightness(0.8); }
        .r { transform: rotateY(90deg) translateZ(20px); filter: brightness(0.6); }
        .t { height: 40px; transform: rotateX(90deg) translateZ(calc(var(--h) - 20px)); filter: brightness(1.1); }
        
        .roof {
            position: absolute; width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 25px solid #444;
            transform: translateZ(var(--h)) rotateX(-90deg);
        }

        .label {
            position: absolute; transform: rotateZ(45deg) rotateX(-60deg);
            font-size: 12px; white-space: nowrap; bottom: -25px; color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-profile">
            <h3 id="userNameDisplay">مرحباً، طالب ونار</h3>
            <p style="font-size: 0.8rem; color: var(--accent);">مستوى الإنجاز: <span id="level">1</span></p>
        </div>

        <div class="timer-box">
            <div id="timer-label">مؤقت التركيز</div>
            <div id="timer-display">25:00</div>
            <button class="btn-start" onclick="toggleTimer()" id="timerBtn">ابدأ التركيز</button>
        </div>

        <div class="input-card">
            <label>سجل مادة جديدة</label>
            <input type="text" id="subjectName" placeholder="مثلاً: كيمياء - الفصل الأول">
            <select id="subjectType">
                <option value="#ff4b2b">مواد علمية (فيزياء/رياضيات)</option>
                <option value="#45a247">مواد طبيعية (أحياء/بيئة)</option>
                <option value="#fbd033">مواد أدبية (لغات/تاريخ)</option>
            </select>
            <button class="btn-build" onclick="manualBuild()">إضافة إنجاز فوراً</button>
        </div>

        <div id="history" style="font-size: 0.8rem;">
            <strong>آخر الإنجازات:</strong>
            <ul id="historyList"></ul>
        </div>
        
        <button onclick="clearData()" style="background:none; color:grey; border:1px solid #333; font-size: 0.7rem;">مسح جميع البيانات</button>
    </div>

    <div class="city-view">
        <div class="grid-plane" id="mainGrid"></div>
    </div>

    <script>
        let timer;
        let timeLeft = 1500;
        let isRunning = false;
        let buildings = JSON.parse(localStorage.getItem('wannarCity')) || [];
        let gridIndex = buildings.length;

        // تحديث الواجهة عند التحميل
        window.onload = () => {
            buildings.forEach((b, index) => drawBuilding(b.name, b.color, index));
            updateStats();
        };

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timer);
                document.getElementById('timerBtn').innerText = "استئناف";
            } else {
                timer = setInterval(updateTimer, 1000);
                document.getElementById('timerBtn').innerText = "إيقاف مؤقت";
            }
            isRunning = !isRunning;
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                clearInterval(timer);
                alert("كفو! انتهى وقت التركيز، تم إضافة مبنى لمدينتك.");
                manualBuild();
                timeLeft = 1500;
            }
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function manualBuild() {
            const name = document.getElementById('subjectName').value || "مادة دراسية";
            const color = document.getElementById('subjectType').value;
            
            const newBuilding = { name, color };
            buildings.push(newBuilding);
            localStorage.setItem('wannarCity', JSON.stringify(buildings));
            
            drawBuilding(name, color, gridIndex);
            gridIndex++;
            updateStats();
        }

        function drawBuilding(name, color, index) {
            const grid = document.getElementById('mainGrid');
            const b = document.createElement('div');
            b.className = 'house';
            
            // حساب الموقع بنظام الشبكة (50px لكل مربع)
            const col = index % 8;
            const row = Math.floor(index / 8);
            const height = Math.floor(Math.random() * 60) + 40;

            b.style.left = (col * 60 + 20) + 'px';
            b.style.top = (row * 60 + 20) + 'px';
            b.style.setProperty('--h', height + 'px');
            b.style.setProperty('--c', color);

            b.innerHTML = `
                <div class="wall f"></div>
                <div class="wall r"></div>
                <div class="wall t"></div>
                <div class="roof" style="transform: translateZ(${height}px) rotateX(-90deg)"></div>
                <div class="label">${name}</div>
            `;
            grid.appendChild(b);
        }

        function updateStats() {
            document.getElementById('level').innerText = Math.floor(buildings.length / 5) + 1;
            const list = document.getElementById('historyList');
            list.innerHTML = buildings.slice(-3).map(b => `<li>${b.name}</li>`).join('');
        }

        function clearData() {
            if(confirm("هل متأكد من مسح مدينتك؟")){
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
