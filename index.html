<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wannar OS | منصة ونار التعليمية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">WANNAR <span>STUDENT</span></div>
            
            <div class="card status-card">
                <p>مخطط الإنجاز الفردي</p>
                <div class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <span id="progressText">0% مكتمل</span>
            </div>

            <div class="card timer-card">
                <div id="timerDisplay" class="timer">25:00</div>
                <button id="timerBtn" class="primary-btn">ابدأ جلسة التركيز</button>
            </div>

            <div class="task-input-section">
                <input type="text" id="taskName" placeholder="ما هي مادة اليوم؟">
                <button id="addProgressBtn" class="secondary-btn">تحديث المعمار 🏗️</button>
            </div>

            <div class="user-info">
                <p id="userName">المستخدم: طالب ونار</p>
                <button onclick="resetSystem()" class="reset-btn">إعادة ضبط المخطط</button>
            </div>
        </aside>

        <main class="viewport">
            <div class="grid-floor" id="cityGrid">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
